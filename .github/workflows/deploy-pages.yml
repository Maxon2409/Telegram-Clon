# Сборка веб-версии и публикация на GitHub Pages (ветка gh-pages)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
        run: npm run build:web

      - name: List build output
        run: |
          echo "=== Contents of dist ==="
          ls -la dist || true
          test -f dist/index.html || (echo "ERROR: dist/index.html not found" && exit 1)

      - name: Add .nojekyll for GitHub Pages
        run: touch dist/.nojekyll

      - name: Fix base path for GitHub Pages subpath
        run: |
          sed -i 's|<head>|<head><base href="/Telegram-Clon/">|' dist/index.html
          sed -i 's|src="/_expo|src="/Telegram-Clon/_expo|g' dist/index.html
          sed -i 's|href="/_expo|href="/Telegram-Clon/_expo|g' dist/index.html
          sed -i 's|src="/assets|src="/Telegram-Clon/assets|g' dist/index.html
          sed -i 's|href="/assets|href="/Telegram-Clon/assets|g' dist/index.html
          find dist -name "*.js" -exec sed -i 's|"/_expo/|"/Telegram-Clon/_expo/|g' {} \;
          find dist -name "*.js" -exec sed -i 's|"/assets/|"/Telegram-Clon/assets/|g' {} \;

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
